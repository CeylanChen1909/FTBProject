server:
  port: 9009

spring:
  application:
    name: football-crawler-service
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/football_forecast?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_ADDR:127.0.0.1:8080}
    sentinel:
      enabled: true
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# 爬虫配置
crawler:
  # 爬取间隔（毫秒），避免请求过快被封
  request-interval-ms: 2000
  # User-Agent
  user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
  # 数据源URL
  flashscore:
    base-url: https://www.flashscore.com
    football-url: https://www.flashscore.com/football

# 定时任务配置
scheduled:
  # 比赛数据同步间隔（分钟）
  match-sync-interval: 5
  # 积分榜同步间隔（小时）
  standings-sync-interval: 12

deepseek:
  api-key: sk-9dc57c5d1e514dfeaeb700144ab22ec7
  base-url: https://api.deepseek.com
  model: deepseek-v4-pro
