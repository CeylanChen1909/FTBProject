server:
  port: 9003
spring:
  application:
    name: football-news-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:football_forecast}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        enabled: true
        # 本地开发固定连接 Nacos API 端口 8848；Nacos 2.x gRPC 会自动使用 9848。
        # 不要配置成控制台/网关端口 8080，否则客户端会尝试连接 9080 并注册失败。
        server-addr: 127.0.0.1:8848
    sentinel:
      enabled: false
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
crawler:
  base-url: ${CRAWLER_BASE_URL:http://127.0.0.1:9009}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.chen.football.news: INFO
