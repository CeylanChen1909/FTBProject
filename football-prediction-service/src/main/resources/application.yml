server:
  port: 9005
spring:
  application:
    name: football-prediction-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:football_forecast}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
    sentinel:
      enabled: true
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
python:
  inference:
    enabled: ${PYTHON_INFERENCE_ENABLED:true}
    url: ${PYTHON_INFERENCE_URL:http://127.0.0.1:5001}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.chen.football.prediction: INFO
